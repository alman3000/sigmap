<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>graffmap · Galerie</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/glightbox/3.3.1/css/glightbox.min.css"
        integrity="sha512-T+KoG3fbDoSnlgEXFQqwcTC9AdkFIxhBlmoaFqYaIjq2ShhNwNao9AKaLUPMfwiBPL0ScxAtc+UYbHAgvd+sjQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #1a1a1a;
      --bg2:    #242424;
      --bg3:    #2e2e2e;
      --border: #3a3a3a;
      --text:   #e0e0e0;
      --muted:  #888;
      --amber:  #f59e0b;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    /* ── Header ──────────────────────────────────────────────────────────── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(26,26,26,.97);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex; align-items: center; gap: 16px;
    }
    header h1 { color: var(--amber); font-size: 1.2rem; flex: 1; }

    #stats-bar { font-size: 12px; color: var(--muted); white-space: nowrap; }

    .nav-btn {
      padding: 6px 14px; border-radius: 6px; font-size: 13px;
      font-weight: 600; cursor: pointer; border: 1px solid var(--border);
      background: var(--bg3); color: var(--text); text-decoration: none;
      transition: background .15s; white-space: nowrap;
    }
    .nav-btn:hover { background: var(--border); }

    /* ── Filter bar ───────────────────────────────────────────────────────── */
    #filter-bar {
      padding: 10px 24px;
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 49px; z-index: 90;
      background: rgba(26,26,26,.97); backdrop-filter: blur(10px);
    }
    .filter-label { font-size: 12px; color: var(--muted); font-weight: 600; }

    .tag-pill {
      padding: 4px 12px; border-radius: 20px; font-size: 12px;
      cursor: pointer; border: 1px solid var(--border);
      background: var(--bg3); color: var(--muted); transition: all .15s;
    }
    .tag-pill:hover  { border-color: var(--amber); color: var(--text); }
    .tag-pill.active { background: #3a2a1a; border-color: var(--amber); color: var(--amber); font-weight: 700; }

    #sort-btn {
      margin-left: auto;
      padding: 4px 12px; border-radius: 20px; font-size: 12px;
      cursor: pointer; border: 1px solid var(--border);
      background: var(--bg3); color: var(--muted); transition: all .15s;
    }
    #sort-btn:hover { border-color: var(--amber); color: var(--text); }

    /* ── Gallery ─────────────────────────────────────────────────────────── */
    #gallery-main {
      padding: 24px;
      max-width: 1600px;
      margin: 0 auto;
    }

    .month-section { margin-bottom: 36px; }

    .month-header {
      font-size: .78rem; font-weight: 700;
      color: var(--muted); text-transform: uppercase; letter-spacing: .1em;
      margin-bottom: 10px;
      display: flex; align-items: center; gap: 10px;
    }
    .month-header::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
      gap: 8px;
    }

    /* ── Tile ─────────────────────────────────────────────────────────────── */
    .photo-tile {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: border-color .15s;
    }
    .photo-tile:hover { border-color: #555; }

    .tile-img-link {
      display: block;
      width: 100%;
      aspect-ratio: 1;
      overflow: hidden;
      flex-shrink: 0;
    }
    .tile-img-link img {
      width: 100%; height: 100%;
      object-fit: cover;
      image-orientation: from-image;
      display: block;
      transition: transform .25s;
    }
    .tile-img-link:hover img { transform: scale(1.06); }

    /* Footer — always visible */
    .tile-footer {
      padding: 5px 8px 6px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .tile-footer-row {
      display: flex;
      align-items: center;
      gap: 6px;
      min-height: 20px;
    }

    .tile-tags { display: flex; flex-wrap: wrap; gap: 3px; flex: 1; }
    .tile-tag {
      font-size: 10px; font-weight: 700;
      background: var(--amber); color: #111;
      border-radius: 3px; padding: 1px 5px;
    }

    .tile-links { display: flex; gap: 6px; flex-shrink: 0; }
    .tile-map-link {
      font-size: 11px; color: var(--muted); text-decoration: none;
      white-space: nowrap; transition: color .15s;
    }
    .tile-map-link:hover { color: var(--amber); }

    .tile-date {
      font-size: 10px;
      color: #555;
    }

    /* ── States ───────────────────────────────────────────────────────────── */
    #initial-loading, #empty-state, #page-loading {
      text-align: center; padding: 40px;
      color: var(--muted); font-size: 14px;
    }
    #scroll-sentinel { height: 1px; }

    /* ── GLightbox dark theme ────────────────────────────────────────────── */
    .glightbox-clean .gslide-description {
      background: rgba(20, 20, 20, 0.97);
      border-top: 1px solid #3a3a3a;
    }
    .glightbox-clean .gdesc-inner { padding: 10px 16px 14px; }
    .glightbox-clean .gslide-desc { color: #e0e0e0; font-size: 13px; margin: 0; }
    .glightbox-clean .gclose,
    .glightbox-clean .gnext,
    .glightbox-clean .gprev { background: rgba(20, 20, 20, 0.65); border-radius: 50%; }

    /* Caption elements */
    .lb-caption { display: flex; flex-direction: column; gap: 6px; }
    .lb-top { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .lb-filename { font-size: 13px; font-weight: 600; color: #f59e0b; word-break: break-all; }
    .lb-date { font-size: 12px; color: #888; white-space: nowrap; }
    .lb-tags { display: flex; gap: 4px; flex-wrap: wrap; }
    .lb-tag {
      font-size: 10px; font-weight: 700;
      background: #f59e0b; color: #111;
      border-radius: 3px; padding: 1px 5px;
    }
    .lb-links { display: flex; gap: 12px; }
    .lb-link {
      font-size: 12px; color: #6b7280; text-decoration: none;
      transition: color .15s;
    }
    .lb-link:hover { color: #f59e0b; }

    /* ── Scroll-to-top ────────────────────────────────────────────────────── */
    #scroll-top {
      position: fixed; bottom: 24px; right: 24px;
      width: 40px; height: 40px;
      background: var(--amber); color: #111;
      border: none; border-radius: 50%;
      font-size: 18px; cursor: pointer;
      display: none; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,.4);
      transition: background .15s; z-index: 200;
    }
    #scroll-top:hover { background: #fbbf24; }
    #scroll-top.visible { display: flex; }

    /* ── Responsive ───────────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      #gallery-main { padding: 12px; }
      .photo-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 6px; }
      header { padding: 10px 14px; }
      #filter-bar { padding: 8px 14px; top: 45px; }
    }
  </style>
</head>
<body>

<header>
  <h1>graffmap · Galerie</h1>
  <span id="stats-bar"></span>
  <a class="nav-btn" href="/">🗺 Karte</a>
</header>

<div id="filter-bar">
  <span class="filter-label">Tags:</span>
  <button id="sort-btn">⬇ Neueste zuerst</button>
</div>

<main id="gallery-main">
  <div id="initial-loading">Galerie wird geladen…</div>
</main>

<div id="scroll-sentinel"></div>
<div id="page-loading" hidden>Weitere Fotos werden geladen…</div>

<button id="scroll-top" title="Nach oben">↑</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/glightbox/3.3.1/js/glightbox.min.js"
        integrity="sha512-XL54SjceXZFzblziNnaFFaXggzqCuZrFS4loWPpvPJ6Kg0kc2HyL89+cPeH0GMq0sKL2SegzUmA8Lx9a0st2ow=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script>
  let TAGS = ['graffiti', 'sticker', 'tag', 'streetart']; // populated from /api/tags on init
  const LIMIT = 100;

  // ── State ─────────────────────────────────────────────────────────────────
  let allPhotos   = [];   // flat list of all loaded photo objects
  let lbElements  = [];   // mirrors allPhotos for GLightbox
  const monthSections = new Map(); // monthKey → { grid, hdr, count, label }

  let offset    = 0;
  let total     = null;
  let hasMore   = true;
  let loading   = false;
  let activeTags = new Set();
  let sortAsc   = false;
  let abortCtrl = null;

  const main          = document.getElementById('gallery-main');
  const pageLoadingEl = document.getElementById('page-loading');

  // ── Lightbox via event delegation — no reload() on every render ───────────
  const lightbox = GLightbox({ touchNavigation: true, loop: false, elements: [] });
  main.addEventListener('click', e => {
    const link = e.target.closest('.glightbox');
    if (!link) return;
    e.preventDefault();
    lightbox.setElements(lbElements);
    lightbox.openAt(+link.dataset.idx);
  });

  // ── Infinite scroll ───────────────────────────────────────────────────────
  const sentinel = document.getElementById('scroll-sentinel');
  const observer = new IntersectionObserver(
    entries => { if (entries[0].isIntersecting) loadPage(); },
    { rootMargin: '400px' }
  );
  observer.observe(sentinel);

  // ── Helpers ───────────────────────────────────────────────────────────────

  function parseDateTime(dt) {
    if (!dt) return null;
    const m = dt.match(/^(\d{4}):(\d{2}):(\d{2})[\s:](\d{2}):(\d{2}):(\d{2})/);
    if (m) return new Date(+m[1], +m[2]-1, +m[3], +m[4], +m[5], +m[6]);
    const d = new Date(dt);
    return isNaN(d.getTime()) ? null : d;
  }

  const MONTH_NAMES = ['Januar','Februar','März','April','Mai','Juni',
                       'Juli','August','September','Oktober','November','Dezember'];

  function formatMonth(d) {
    return d ? MONTH_NAMES[d.getMonth()] + ' ' + d.getFullYear() : 'Unbekannt';
  }

  function monthKey(d) {
    return d ? d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') : '0000-00';
  }

  function updateStats() {
    if (total === null) return;
    document.getElementById('stats-bar').textContent =
      total.toLocaleString('de-DE') + ' Fotos' + (activeTags.size ? ' (gefiltert)' : '');
  }

  // ── Tag filter UI ─────────────────────────────────────────────────────────

  function buildTagFilter() {
    const bar     = document.getElementById('filter-bar');
    const sortBtn = document.getElementById('sort-btn');
    TAGS.forEach(tag => {
      const btn = document.createElement('button');
      btn.className = 'tag-pill';
      btn.textContent = tag;
      btn.addEventListener('click', () => {
        activeTags.has(tag) ? activeTags.delete(tag) : activeTags.add(tag);
        btn.classList.toggle('active', activeTags.has(tag));
        reset();
      });
      bar.insertBefore(btn, sortBtn);
    });
  }

  // ── Lightbox caption (HTML) ───────────────────────────────────────────────

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function buildLightboxCaption(photo) {
    const monthParam = photo.date ? `&month=${monthKey(photo.date)}` : '';
    const tagsHtml   = photo.tags.map(t => `<span class="lb-tag">${esc(t)}</span>`).join('');
    const sigHref    = photo.lat != null
      ? `/?lat=${photo.lat.toFixed(6)}&lng=${photo.lon.toFixed(6)}&zoom=18${monthParam}&file=${encodeURIComponent(photo.filename)}`
      : null;
    const gHref      = photo.lat != null
      ? `https://maps.google.com/?q=${photo.lat.toFixed(6)},${photo.lon.toFixed(6)}`
      : null;

    return `<div class="lb-caption">
      <div class="lb-top">
        <span class="lb-filename">${esc(photo.filename)}</span>
        ${photo.dateStr ? `<span class="lb-date">${esc(photo.dateStr)}</span>` : ''}
        ${tagsHtml     ? `<div  class="lb-tags">${tagsHtml}</div>` : ''}
      </div>
      ${sigHref ? `<div class="lb-links">
        <a class="lb-link" href="${sigHref}">📍 Karte</a>
        <a class="lb-link" href="${esc(gHref)}" target="_blank" rel="noopener noreferrer">🗺 GMaps</a>
      </div>` : ''}
    </div>`;
  }

  // ── Build tile ────────────────────────────────────────────────────────────

  function buildTile(photo) {
    const tile = document.createElement('div');
    tile.className = 'photo-tile';

    const a = document.createElement('a');
    a.className = 'tile-img-link glightbox';
    a.href = photo.original;
    a.dataset.idx = photo.idx;

    const img = document.createElement('img');
    img.src     = photo.thumb;
    img.alt     = photo.filename;
    img.loading = 'lazy';
    img.decoding = 'async';
    a.appendChild(img);
    tile.appendChild(a);

    const footer = document.createElement('div');
    footer.className = 'tile-footer';

    // Row: tags (flex-grow) + map links (right-aligned)
    const row = document.createElement('div');
    row.className = 'tile-footer-row';

    const tagsDiv = document.createElement('div');
    tagsDiv.className = 'tile-tags';
    photo.tags.forEach(t => {
      const span = document.createElement('span');
      span.className = 'tile-tag';
      span.textContent = t;
      tagsDiv.appendChild(span);
    });
    row.appendChild(tagsDiv);

    if (photo.lat != null) {
      const links = document.createElement('div');
      links.className = 'tile-links';

      const sigLink = document.createElement('a');
      sigLink.className   = 'tile-map-link';
      const monthParam    = photo.date ? `&month=${monthKey(photo.date)}` : '';
      sigLink.href        = `/?lat=${photo.lat.toFixed(6)}&lng=${photo.lon.toFixed(6)}&zoom=18${monthParam}&file=${encodeURIComponent(photo.filename)}`;
      sigLink.title       = 'Auf graffmap-Karte anzeigen';
      sigLink.textContent = 'Karte';
      links.appendChild(sigLink);

      const gLink = document.createElement('a');
      gLink.className   = 'tile-map-link';
      gLink.href        = `https://maps.google.com/?q=${photo.lat.toFixed(6)},${photo.lon.toFixed(6)}`;
      gLink.target      = '_blank';
      gLink.rel         = 'noopener noreferrer';
      gLink.title       = 'Bei Google Maps öffnen';
      gLink.textContent = 'GMaps';
      links.appendChild(gLink);

      row.appendChild(links);
    }

    footer.appendChild(row);

    if (photo.dateStr) {
      const dateEl = document.createElement('div');
      dateEl.className   = 'tile-date';
      dateEl.textContent = photo.dateStr;
      footer.appendChild(dateEl);
    }

    tile.appendChild(footer);
    return tile;
  }

  // ── Append a batch from API ───────────────────────────────────────────────

  function appendBatch(rawPhotos) {
    rawPhotos.forEach(raw => {
      const date  = parseDateTime(raw.datetime);
      const photo = {
        idx:      allPhotos.length,
        filename: raw.filename,
        thumb:    raw.thumb,
        original: raw.original,
        tags:     raw.tags || [],
        date,
        dateStr:  date ? date.toLocaleDateString('de-DE') : '',
        lat:      raw.lat,
        lon:      raw.lon,
      };

      allPhotos.push(photo);
      lbElements.push({
        href:        photo.original,
        type:        'image',
        description: buildLightboxCaption(photo),
      });

      const key = monthKey(date);
      if (!monthSections.has(key)) {
        const section = document.createElement('section');
        section.className = 'month-section';
        const hdr  = document.createElement('div');
        hdr.className = 'month-header';
        const grid = document.createElement('div');
        grid.className = 'photo-grid';
        section.appendChild(hdr);
        section.appendChild(grid);
        main.appendChild(section);
        monthSections.set(key, { grid, hdr, count: 0, label: formatMonth(date) });
      }

      const m = monthSections.get(key);
      m.count++;
      m.hdr.textContent = `${m.label} · ${m.count}`;
      m.grid.appendChild(buildTile(photo));
    });
  }

  // ── Load one page from the API ────────────────────────────────────────────

  async function loadPage() {
    if (loading || !hasMore) return;
    loading = true;
    pageLoadingEl.hidden = false;

    if (abortCtrl) abortCtrl.abort();
    abortCtrl = new AbortController();

    const p = new URLSearchParams({ offset, limit: LIMIT, sort: sortAsc ? 'asc' : 'desc' });
    if (activeTags.size) p.set('tags', [...activeTags].join(','));

    try {
      const r = await fetch('/api/photos?' + p, { signal: abortCtrl.signal });
      if (!r.ok) throw new Error(r.status);
      const data = await r.json();

      if (total === null) {
        total = data.total;
        updateStats();
        document.getElementById('initial-loading')?.remove();
      }

      if (data.total === 0) {
        hasMore = false;
        main.innerHTML = '<div id="empty-state">Keine Fotos gefunden.</div>';
      } else if (data.photos.length) {
        appendBatch(data.photos);
        offset  += data.photos.length;
        hasMore  = offset < data.total;
        if (!hasMore) observer.unobserve(sentinel);
      }
    } catch (e) {
      if (e.name !== 'AbortError') {
        pageLoadingEl.textContent = 'Fehler beim Laden.';
        pageLoadingEl.hidden = false;
        return;
      }
    } finally {
      loading = false;
      pageLoadingEl.hidden = true;
    }
  }

  // ── Reset on filter / sort change ─────────────────────────────────────────

  function reset() {
    if (abortCtrl) abortCtrl.abort();
    loading   = false;
    allPhotos = [];
    lbElements = [];
    monthSections.clear();
    offset  = 0;
    total   = null;
    hasMore = true;
    main.innerHTML = '';
    sentinel.hidden = false;
    observer.observe(sentinel);
    loadPage();
  }

  // ── Sort ──────────────────────────────────────────────────────────────────

  document.getElementById('sort-btn').addEventListener('click', function() {
    sortAsc = !sortAsc;
    this.textContent = sortAsc ? '⬆ Älteste zuerst' : '⬇ Neueste zuerst';
    reset();
  });

  // ── Scroll to top ─────────────────────────────────────────────────────────

  const scrollTopBtn = document.getElementById('scroll-top');
  window.addEventListener('scroll', () => {
    scrollTopBtn.classList.toggle('visible', window.scrollY > 500);
  }, { passive: true });
  scrollTopBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

  // ── Init ──────────────────────────────────────────────────────────────────

  (async function() {
    try {
      const fetched = (await (await fetch('/api/tags')).json()).tags;
      if (Array.isArray(fetched) && fetched.length) TAGS = fetched;
    } catch {}
    buildTagFilter();
    loadPage();
  })();
</script>
</body>
</html>
