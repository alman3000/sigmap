services:

  # ── FastAPI backend ────────────────────────────────────────────────────────
  app:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./photos:/app/photos
      - ./thumbnails:/app/thumbnails
      - ./uploads:/app/uploads
      - ./photos.geojson:/app/photos.geojson
    env_file: .env
    # Allows SMTP_MODE=host to reach the VPS's own postfix/exim4 on port 25
    extra_hosts:
      - "host-gateway:host-gateway"
    networks:
      - internal

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-graffmap}
      POSTGRES_USER:     ${POSTGRES_USER:-graffmap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-graffmap} -d ${POSTGRES_DB:-graffmap}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  # ── Nginx reverse proxy + static files ────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./map.html:/usr/share/nginx/html/index.html:ro
      - ./admin.html:/usr/share/nginx/html/admin.html:ro
      - ./upload.html:/usr/share/nginx/html/upload.html:ro
      - ./gallery.html:/usr/share/nginx/html/gallery.html:ro
      - ./logo.png:/usr/share/nginx/html/logo.png:ro
      - ./favicon.ico:/usr/share/nginx/html/favicon.ico:ro
      - ./photos:/usr/share/nginx/html/photos:ro
      - ./thumbnails:/usr/share/nginx/html/thumbnails:ro
      - ./photos.geojson:/usr/share/nginx/html/photos.geojson:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - internal

  # ── Certbot — run manually to issue/renew TLS certificates ──────────────────
  certbot:
    image: certbot/certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'
    restart: unless-stopped

  # ── SMTP relay container (Option B — only active with --profile smtp-relay) ─
  smtp-relay:
    image: boky/postfix
    restart: unless-stopped
    profiles:
      - smtp-relay
    environment:
      ALLOWED_SENDER_DOMAINS: ${SMTP_RELAY_DOMAIN:-graffmap.local}
      POSTFIX_myhostname: smtp-relay
    networks:
      - internal

  # ── MailHog — local mail catcher for development (--profile dev) ───────────
  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    profiles:
      - dev
    ports:
      - "8025:8025"   # Web UI  →  http://localhost:8025
    networks:
      - internal

volumes:
  postgres_data:
  certbot_www:
  certbot_certs:

networks:
  internal:
    driver: bridge
