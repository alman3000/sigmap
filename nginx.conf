events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile           on;
    keepalive_timeout  65;
    client_max_body_size 100m;

    types { application/geo+json geojson; }

    gzip            on;
    gzip_comp_level 5;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml image/svg+xml application/geo+json;

    # ── HTTP ──────────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Let's Encrypt ACME challenge (certbot)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # ── uncomment to force HTTPS once a cert exists ──────────────────────
        # return 301 https://$host$request_uri;

        root  /usr/share/nginx/html;
        index index.html;

        # Static photos and thumbnails — long-lived cache
        location ~* ^/(photos|thumbnails)/ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # GeoJSON — short cache so tag/approval changes are visible quickly
        location ~* \.geojson$ {
            expires 2m;
            add_header Cache-Control "public, must-revalidate";
        }

        # Other static assets
        location ~* \.(css|js|ico|png|jpg|jpeg|svg|woff2?)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # API → FastAPI
        location /api/ {
            proxy_pass         http://app:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        location / {
            try_files $uri $uri/ =404;
        }
    }

    # ── HTTPS — uncomment and fill in your domain once you have a cert ────────
    # server {
    #     listen 443 ssl;
    #     server_name yourdomain.com;
    #
    #     ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     root  /usr/share/nginx/html;
    #     index index.html;
    #
    #     location /.well-known/acme-challenge/ { root /var/www/certbot; }
    #
    #     location ~* ^/(photos|thumbnails)/ { expires 30d; add_header Cache-Control "public, immutable"; }
    #     location ~* \.geojson$            { expires 2m;  add_header Cache-Control "public, must-revalidate"; }
    #     location ~* \.(css|js|ico|png|jpg|jpeg|svg|woff2?)$ { expires 7d; add_header Cache-Control "public, immutable"; }
    #
    #     location /api/ {
    #         proxy_pass         http://app:8000;
    #         proxy_set_header   Host              $host;
    #         proxy_set_header   X-Real-IP         $remote_addr;
    #         proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    #         proxy_set_header   X-Forwarded-Proto $scheme;
    #         proxy_read_timeout 300s;
